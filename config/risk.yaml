# ============================================================
# TRADING BOT - RISK PARAMETERS
# ============================================================
# All values are hard limits — the Risk Manager enforces them
# regardless of any signal, AI, or strategy instruction.

risk:
  # ---- Per-trade risk ----
  max_risk_per_trade_pct: 0.02     # 2% risk max par trade (était 3%)
  min_risk_reward_ratio: 2.0       # Exiger R:R >= 2.0 pour un meilleur ratio gain/perte
  max_leverage: 50.0               # Forex intraday leverage (EUR/USD standard)

  # ---- Daily / weekly / monthly loss limits ----
  max_daily_loss_pct: 0.10         # 10%
  max_weekly_loss_pct: 0.20        # 20%
  max_monthly_drawdown_pct: 0.30   # 30%
  max_total_drawdown_pct: 0.40     # 40% — triggers defensive mode

  # ---- Exposure limits ----
  max_total_exposure_pct: 0.80     # 80% max invested
  min_cash_reserve_pct: 0.10       # Always keep 10% cash
  max_intraday_allocation_pct: 0.90   # 90% of capital can be intraday margin (multi-asset)
  max_swing_allocation_pct: 0.50
  max_long_term_allocation_pct: 0.80

  # ---- Position limits ----
  max_open_positions: 25
  max_positions_per_strategy: 8
  max_exposure_per_asset_pct: 0.30    # 30% per asset — allows 4 simultaneous positions
  max_exposure_per_sector_pct: 0.95

  # ---- Correlation ----
  max_correlation_exposure: 0.70      # Block if portfolio correlation > 0.70

  # ---- Intraday specific ----
  intraday:
    max_consecutive_losses: 20
    max_daily_trades: 200
    stop_after_daily_loss_pct: 0.20   # 20% before stopping intraday (paper mode — agressif)
    min_volume_intraday: 0            # no volume filter on forex
    max_spread_pct: 0.005             # 0.5% — relaxed for aggressive mode

  # ---- Swing specific ----
  swing:
    max_consecutive_losses: 4
    min_days_between_same_asset: 2

  # ---- Long term specific ----
  long_term:
    min_holding_days: 5
    max_rebalance_frequency_days: 30

# ---- Kill Switch triggers ----
kill_switch:
  daily_loss_pct: 0.25        # 25% daily loss before halt (paper mode — agressif)
  weekly_loss_pct: 0.40       # 40%
  monthly_drawdown_pct: 0.50  # 50%
  max_api_errors_per_hour: 10
  max_data_gap_minutes: 15
  max_latency_ms: 5000
  max_consecutive_blocked_trades: 10
  # If triggered, how long to stay halted (minutes). 0 = manual restart only.
  halt_duration_minutes: 0   # 0 = manual restart required

# ---- Defensive mode ----
defensive_mode:
  # Triggered when conditions deteriorate — reduces exposure automatically
  trigger_drawdown_pct: 0.30    # 30% drawdown avant mode défensif (paper mode)
  max_exposure_pct: 0.80
  intraday_enabled: true        # Toujours actif — intraday génère du P&L
  swing_enabled: true
  long_term_enabled: true
  auto_exit_losing_swing: false

# ---- Position sizing defaults ----
position_sizing:
  method: "fixed_fractional"   # fixed_fractional | kelly | equal_weight
  kelly_fraction: 0.25          # Conservative Kelly (quarter-Kelly)
  fixed_risk_pct: 0.015         # 1.5% risk par trade (était 2%) — courbe plus stable
  min_position_usd: 50.0        # Minimum margin per trade
  max_position_usd: 500000.0    # No hard cap — risk formula controls size

# ---- Trailing stop ----
trailing_stop:
  enabled: true
  trail_be_r: 0.25              # Distance de trailing = 25% du risque initial
  # Activation : dès que le profit >= trail_be_r × risque_initial
  # Ex: risque=100 pips → trailing de 25 pips, déclenché dès +25 pips de profit
  # Suit le meilleur prix vu (high-water mark) en continu
