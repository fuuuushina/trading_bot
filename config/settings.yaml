# ============================================================
# TRADING BOT - GLOBAL SETTINGS
# ============================================================

system:
  mode: "paper"          # paper | live  — NEVER switch to live manually
  live_enabled: false    # Must be explicitly set to true after full validation
  version: "0.1.0"
  timezone: "Europe/Paris"
  log_level: "INFO"

# ---- Data sources ----
data:
  provider: "yfinance"       # yfinance | alpaca | ibkr | custom
  backup_provider: null
  historical_lookback_days: 730
  intraday_interval: "5m"    # 1m | 5m | 15m | 30m | 1h
  swing_interval: "1d"
  longterm_interval: "1d"
  max_missing_pct: 0.02      # 2% missing bars max before alert
  min_volume_threshold: 100000
  cache_dir: "data/cache"
  cache_ttl_seconds: 300

# ---- Assets ----
universe:
  long_term:
    - "SPY"
    - "QQQ"
    - "IWM"
    - "GLD"
    - "TLT"
    - "VT"
  swing:
    - "AAPL"
    - "MSFT"
    - "NVDA"
    - "AMZN"
    - "GOOGL"
    - "META"
    - "JPM"
    - "XLE"
  intraday:
    - "EURUSD=X"    # EUR/USD forex — fetched at 5min via yfinance
  # Equity intraday (disabled for MVP forex mode — re-enable when needed)
  intraday_equity:
    - "SPY"
    - "QQQ"
    - "AAPL"
    - "MSFT"
  excluded: []

# ---- Market hours (UTC) ----
market_hours:
  us_open: "13:30"
  us_close: "20:00"
  pre_market_buffer_minutes: 15
  post_market_buffer_minutes: 0
  intraday_cutoff_minutes_before_close: 30

# ---- Broker ----
broker:
  paper:
    provider: "local"              # local PaperBroker — forex not supported by Alpaca
    initial_capital: 10000.0       # EUR/USD trades in larger notional (1 lot = 100k)
    execution_enabled: true
    min_position_usd: 100.0        # min order size
    max_position_usd: 2000.0       # max 20% of capital per trade
    watchlist: ["EURUSD=X"]
    refresh_seconds: 300           # 5 min refresh
    commission_per_trade: 0.0
    commission_pct: 0.0
    slippage_pct: 0.0002           # 0.02% = ~2 pips spread for EUR/USD
  live:
    name: "alpaca"                  # alpaca | ibkr
    api_key_env: "BROKER_API_KEY"
    api_secret_env: "BROKER_API_SECRET"
    base_url_env: "BROKER_BASE_URL"

# ---- AI Layer ----
ai:
  enabled: false            # Mettre true si tu as une clé ANTHROPIC_API_KEY
  provider: "anthropic"
  api_key_env: "ANTHROPIC_API_KEY"
  strategic_model: "claude-opus-4-6"
  live_model: "claude-sonnet-4-6"
  strategic_temperature: 0.2
  live_temperature: 0.6
  max_tokens: 1024
  timeout_seconds: 15
  # AI is ADVISORY ONLY — never executes trades
  advisory_only: true
  # Minimum agreement level to not block on AI disagreement
  disagreement_threshold: 0.4

# ---- Notifications ----
alerts:
  telegram:
    enabled: false
    bot_token_env: "TELEGRAM_BOT_TOKEN"
    chat_id_env: "TELEGRAM_CHAT_ID"
  discord:
    enabled: false
    webhook_env: "DISCORD_WEBHOOK_URL"
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    user_env: "EMAIL_USER"
    password_env: "EMAIL_PASSWORD"
    recipient_env: "EMAIL_RECIPIENT"
  # Minimum severity to notify: DEBUG | INFO | WARNING | CRITICAL
  min_severity: "WARNING"

# ---- Market Watcher ----
market_watcher:
  mvp_mode: true                  # true = cycle unique pour tous les types
  mvp_cycle_seconds: 300          # 5 min — synchronisé avec les bars EUR/USD
  intraday_interval_seconds: 300  # 5 min
  hourly_interval_seconds: 3600   # 1h
  daily_interval_seconds: 86400   # 24h
  llm_interval_seconds: 86400     # LLM Market Analyst 1x/jour max
  # Fetch config for intraday tickers (EURUSD=X, etc.)
  intraday_period: "5d"           # yfinance period for 5min data (max 60d)
  intraday_interval: "5m"         # yfinance interval for intraday

# ---- Market Analyst (LLM) ----
market_analyst:
  enabled: true
  provider: "groq"                        # groq | claude | qwen
  model: "llama-3.3-70b-versatile"        # modèle Groq (gratuit)
  temperature: 0.2
  max_tokens: 800
  timeout_seconds: 20

# ---- Signal Aggregator ----
signal_aggregator:
  min_confidence: 0.45        # Confidence minimale pour transmettre un signal agrégé

# ---- News Layer ----
news:
  enabled: true               # Finnhub activé
  refresh_minutes: 30         # Fréquence de collecte
  max_age_hours: 24           # Ancienneté max des articles
  sources:                    # Sources activées (par ordre de priorité)
    - "finnhub"
    - "rss"
  # API keys (optionnelles — récupérées depuis .env si non définies ici)
  finnhub_api_key: null       # ou env var FINNHUB_API_KEY
  newsapi_key: null           # ou env var NEWSAPI_KEY
  alpha_vantage_key: null     # ou env var ALPHA_VANTAGE_KEY

# ---- Monitoring ----
monitoring:
  log_dir: "data/logs"
  report_dir: "data/reports"
  daily_report_time: "21:00"
  weekly_report_day: "Sunday"
  dashboard_port: 8050
  dashboard_enabled: true
