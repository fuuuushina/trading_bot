# ============================================================
# TRADING BOT - STRATEGY PARAMETERS
# ============================================================
# Active strategies (small capital, ETF-focused):
#   true_dca         — monthly DCA accumulation on SPY
#   trend_following  — EMA stack + ADX swing entries
#   breakout         — N-day high/low aligned with EMA200
#   rsi_dip_buyer    — Connors RSI(2) mean-reversion (75-80% win rate)
# ============================================================

strategies:

  # ---- True DCA (Fixed Allocation) ----
  true_dca:
    enabled: true
    horizon: "long_term"
    assets: ["SPY"]
    buy_day_of_month: 1
    monthly_size_pct: 0.022       # 2.2% → ~41 buys over 4 years (0.90/0.022)
    dip_buy_enabled: true
    dip_size_pct: 0.033           # 1.5× monthly on dips
    dip_threshold_pct: -0.05      # Dip ≥ 5% over 5 days
    max_exposure_pct: 0.90        # Cost-basis cap vs initial capital
    min_cash_reserve_pct: 0.05

  # ---- Trend Following (Swing) ----
  trend_following:
    enabled: true
    horizon: "swing"
    timeframe: "1d"
    ema_fast: 20
    ema_slow: 50
    ema_trend: 200
    min_adx: 25                   # Confirm trend, not just drift
    min_confidence: 0.60          # EMA stack (0.55) + some ADX required
    atr_multiplier_sl: 2.0
    atr_multiplier_tp: 3.5

  # ---- Breakout (Swing, EMA200-aligned) ----
  breakout:
    enabled: true
    horizon: "swing"
    timeframe: "1d"
    lookback_period: 20           # N-day high/low for breakout level
    min_atr_pct: 0.005            # Avoid low-vol traps
    min_confidence: 0.70          # Requires breakout + EMA200 alignment
    atr_multiplier_sl: 1.5
    atr_multiplier_tp: 3.0

  # ---- RSI(2) Dip Buyer (Mean Reversion) ----
  rsi_dip_buyer:
    enabled: true
    horizon: "swing"
    timeframe: "1d"
    rsi2_entry_threshold: 15.0    # RSI(2) < 15 = oversold (~3× plus de signaux que <10)
    rsi2_strong_threshold: 8.0    # RSI(2) < 8 = dip fort (confiance plus haute)
    position_size_pct: 0.25       # 25% du capital par trade (fixed_allocation)
    min_confidence: 0.65
    atr_multiplier_sl: 1.5
    atr_multiplier_tp: 2.5

  # ---- Disabled strategies (archived) ----
  tactical_dca:
    enabled: false
    horizon: "long_term"

  mean_reversion:
    enabled: false
    horizon: "swing"

  momentum:
    enabled: false
    horizon: "swing"

  volatility_compression:
    enabled: false
    horizon: "swing"

  rebalancing:
    enabled: false
    horizon: "long_term"
    frequency: "monthly"
    target_weights:
      SPY: 0.40
      QQQ: 0.25
      GLD: 0.15
      TLT: 0.20
    rebalance_threshold_pct: 0.05
    regime_adjust: true

  intraday_mean_reversion:
    enabled: false
    horizon: "intraday"
    timeframe: "5m"

  intraday_breakout:
    enabled: false
    horizon: "intraday"
    timeframe: "5m"

  # ---- Intraday Forex Strategies (EUR/USD 5min) ----
  intraday_ema_cross:
    enabled: true
    horizon: "intraday"
    timeframe: "5m"
    ema_fast: 9
    ema_slow: 21
    rsi_period: 14
    min_confidence: 0.55
    atr_multiplier_sl: 1.5
    atr_multiplier_tp: 2.5

  intraday_bollinger_rsi:
    enabled: true
    horizon: "intraday"
    timeframe: "5m"
    bb_period: 20
    bb_mult: 2.0
    rsi_period: 14
    rsi_overbought: 65
    rsi_oversold: 35
    min_confidence: 0.55
    atr_multiplier_sl: 1.5

  intraday_session_breakout:
    enabled: true
    horizon: "intraday"
    timeframe: "5m"
    consolidation_bars: 24         # 2h pre-session range
    atr_buffer_mult: 0.3           # breakout confirmation buffer
    min_confidence: 0.55
    atr_multiplier_sl: 1.8
    atr_multiplier_tp: 3.0

# ---- Regime-to-strategy mapping ----
# intraday strategies run on 5min forex data (EURUSD=X)
# bollinger_rsi active in range/low_vol/compression only
# session_breakout active in trending + breakout regimes
# ema_cross active in all regimes except panic

regime_strategy_map:
  # Fallback quand le régime est ambigu — stratégies défensives seulement
  unknown:
    long_term: []
    swing: []
    intraday: ["intraday_ema_cross", "intraday_bollinger_rsi"]

  bull_trend:
    long_term: ["true_dca"]
    swing: ["trend_following", "breakout", "rsi_dip_buyer"]
    intraday: ["intraday_ema_cross", "intraday_session_breakout"]
  bear_trend:
    long_term: ["true_dca"]
    swing: []
    intraday: ["intraday_ema_cross", "intraday_session_breakout"]
  range:
    long_term: ["true_dca"]
    swing: ["rsi_dip_buyer"]
    intraday: ["intraday_bollinger_rsi", "intraday_ema_cross"]
  high_volatility:
    long_term: ["true_dca"]
    swing: ["rsi_dip_buyer"]
    intraday: ["intraday_ema_cross"]
  low_volatility:
    long_term: ["true_dca"]
    swing: ["trend_following"]
    intraday: ["intraday_bollinger_rsi", "intraday_ema_cross"]
  panic:
    long_term: ["true_dca"]
    swing: []
    intraday: []    # no intraday in panic — too risky
  euphoric:
    long_term: ["true_dca"]
    swing: []
    intraday: ["intraday_ema_cross"]
  compression:
    long_term: ["true_dca"]
    swing: []
    intraday: ["intraday_bollinger_rsi", "intraday_session_breakout"]
  breakout_expansion:
    long_term: ["true_dca"]
    swing: ["breakout", "trend_following"]
    intraday: ["intraday_session_breakout", "intraday_ema_cross"]
