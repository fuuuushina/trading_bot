# ============================================================
# TRADING BOT - STRATEGY PARAMETERS
# ============================================================
# Active strategies (small capital, ETF-focused):
#   true_dca         — monthly DCA accumulation on SPY
#   trend_following  — EMA stack + ADX swing entries
#   breakout         — N-day high/low aligned with EMA200
#   rsi_dip_buyer    — Connors RSI(2) mean-reversion (75-80% win rate)
# ============================================================

strategies:

  # ---- True DCA (Fixed Allocation) ----
  true_dca:
    enabled: true
    horizon: "long_term"
    assets: ["SPY"]
    buy_day_of_month: 1
    monthly_size_pct: 0.022       # 2.2% → ~41 buys over 4 years (0.90/0.022)
    dip_buy_enabled: true
    dip_size_pct: 0.033           # 1.5× monthly on dips
    dip_threshold_pct: -0.05      # Dip ≥ 5% over 5 days
    max_exposure_pct: 0.90        # Cost-basis cap vs initial capital
    min_cash_reserve_pct: 0.05

  # ---- Trend Following (Swing) ----
  trend_following:
    enabled: true
    horizon: "swing"
    timeframe: "1d"
    ema_fast: 20
    ema_slow: 50
    ema_trend: 200
    min_adx: 10                   # Tres bas pour paper testing
    min_confidence: 0.35
    atr_multiplier_sl: 2.0
    atr_multiplier_tp: 3.5

  # ---- Breakout (Swing, EMA200-aligned) ----
  breakout:
    enabled: true
    horizon: "swing"
    timeframe: "1d"
    lookback_period: 20           # N-day high/low for breakout level
    min_atr_pct: 0.002            # Lowered further
    min_confidence: 0.45          # Lowered for paper testing
    atr_multiplier_sl: 1.5
    atr_multiplier_tp: 3.0

  # ---- RSI(2) Dip Buyer (Mean Reversion) ----
  rsi_dip_buyer:
    enabled: true
    horizon: "swing"
    timeframe: "1d"
    rsi2_entry_threshold: 50.0    # RSI(2) < 50 = oversold (paper mode agressif)
    rsi2_strong_threshold: 25.0   # RSI(2) < 25 = dip fort
    position_size_pct: 0.25       # 25% du capital par trade (fixed_allocation)
    min_confidence: 0.35
    atr_multiplier_sl: 1.5
    atr_multiplier_tp: 2.5

  # ---- Disabled strategies (archived) ----
  tactical_dca:
    enabled: false
    horizon: "long_term"

  mean_reversion:
    enabled: false
    horizon: "swing"

  momentum:
    enabled: false
    horizon: "swing"

  volatility_compression:
    enabled: false
    horizon: "swing"

  rebalancing:
    enabled: false
    horizon: "long_term"
    frequency: "monthly"
    target_weights:
      SPY: 0.40
      QQQ: 0.25
      GLD: 0.15
      TLT: 0.20
    rebalance_threshold_pct: 0.05
    regime_adjust: true

  intraday_mean_reversion:
    enabled: false
    horizon: "intraday"
    timeframe: "5m"

  intraday_breakout:
    enabled: false
    horizon: "intraday"
    timeframe: "5m"

  # ---- Thematic Momentum (Swing — driven by LLM sector analysis) ----
  thematic_momentum:
    enabled: true
    horizon: "swing"
    timeframe: "1d"
    min_theme_score: 0.25
    min_confidence: 0.45
    atr_sl_multiplier: 2.0
    atr_tp_multiplier: 6.0         # R:R = 3.0 (6.0/2.0)
    rsi_max_buy: 72
    rsi_min_sell: 30

  # ---- EMA Cross Swing (Agressive — croisement EMA9/EMA21 daily) ----
  ema_cross_swing:
    enabled: true
    horizon: "swing"
    timeframe: "1d"
    ema_fast: 9
    ema_slow: 21
    min_confidence: 0.45
    atr_sl_multiplier: 2.0
    atr_tp_multiplier: 6.0          # R:R = 3.0

  # ---- Momentum Burst (Agressive — momentum 5j + prix > EMA20) ----
  momentum_burst:
    enabled: true
    horizon: "swing"
    timeframe: "1d"
    min_return_5d: 0.002
    min_confidence: 0.45
    atr_sl_multiplier: 1.8
    atr_tp_multiplier: 5.4          # R:R = 3.0 (5.4/1.8)

  # ---- Intraday Forex Strategies (EUR/USD 5min) ----
  intraday_ema_cross:
    enabled: true
    horizon: "intraday"
    timeframe: "5m"
    ema_fast: 9
    ema_slow: 21
    allow_continuation: true
    rsi_period: 14
    min_confidence: 0.55
    atr_multiplier_sl: 1.5
    atr_multiplier_tp: 4.5         # R:R = 3.0 — break-even à 25% WR

  intraday_bollinger_rsi:
    enabled: true
    horizon: "intraday"
    timeframe: "5m"
    bb_period: 20
    bb_mult: 2.0
    rsi_period: 14
    rsi_overbought: 62
    rsi_oversold: 38
    min_confidence: 0.55
    atr_multiplier_sl: 1.5
    atr_multiplier_tp: 4.5         # R:R = 3.0

  intraday_session_breakout:
    enabled: true
    horizon: "intraday"
    timeframe: "5m"
    consolidation_bars: 24
    atr_buffer_mult: 0.3
    min_confidence: 0.50
    atr_multiplier_sl: 1.8
    atr_multiplier_tp: 5.4         # R:R = 3.0 (5.4/1.8)

  # ---- Intraday Trend Scalp (EMA9/21/50 avec filtres qualité stricts) ----
  intraday_trend_scalp:
    enabled: true
    horizon: "intraday"
    timeframe: "5m"
    ema_fast: 9
    ema_slow: 21
    ema_medium: 50
    min_confidence: 0.55
    atr_multiplier_sl: 1.5
    atr_multiplier_tp: 4.5   # R:R = 3.0
    min_sep_atr_ratio: 0.30
    rsi_low: 40
    rsi_high: 68

  # ---- Intraday MACD (12,26,9 cross + continuation) ----
  intraday_macd:
    enabled: true
    horizon: "intraday"
    timeframe: "5m"
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    ema_trend_period: 21
    min_hist_atr_ratio: 0.10
    min_confidence: 0.55
    atr_multiplier_sl: 1.5
    atr_multiplier_tp: 4.5          # R:R = 3.0

# ---- Regime-to-strategy mapping ----
regime_strategy_map:
  unknown:
    long_term: ["true_dca"]
    swing: ["ema_cross_swing", "momentum_burst", "thematic_momentum", "trend_following", "rsi_dip_buyer"]
    intraday: ["intraday_ema_cross", "intraday_trend_scalp", "intraday_macd", "intraday_bollinger_rsi", "intraday_session_breakout"]

  bull_trend:
    long_term: ["true_dca"]
    swing: ["ema_cross_swing", "momentum_burst", "thematic_momentum", "trend_following", "breakout", "rsi_dip_buyer"]
    intraday: ["intraday_ema_cross", "intraday_trend_scalp", "intraday_macd", "intraday_bollinger_rsi", "intraday_session_breakout"]
  bear_trend:
    long_term: ["true_dca"]
    swing: ["ema_cross_swing", "momentum_burst", "thematic_momentum", "rsi_dip_buyer"]
    intraday: ["intraday_ema_cross", "intraday_trend_scalp", "intraday_macd", "intraday_bollinger_rsi", "intraday_session_breakout"]
  range:
    long_term: ["true_dca"]
    swing: ["ema_cross_swing", "momentum_burst", "thematic_momentum", "rsi_dip_buyer"]
    intraday: ["intraday_ema_cross", "intraday_trend_scalp", "intraday_macd", "intraday_bollinger_rsi", "intraday_session_breakout"]
  high_volatility:
    long_term: ["true_dca"]
    swing: ["ema_cross_swing", "momentum_burst", "rsi_dip_buyer"]
    intraday: ["intraday_ema_cross", "intraday_trend_scalp", "intraday_macd", "intraday_session_breakout"]
  low_volatility:
    long_term: ["true_dca"]
    swing: ["ema_cross_swing", "momentum_burst", "thematic_momentum", "trend_following"]
    intraday: ["intraday_ema_cross", "intraday_trend_scalp", "intraday_macd", "intraday_bollinger_rsi", "intraday_session_breakout"]
  panic:
    long_term: ["true_dca"]
    swing: ["rsi_dip_buyer"]
    intraday: ["intraday_trend_scalp"]   # scalp seulement — plus agile en panic
  euphoric:
    long_term: ["true_dca"]
    swing: ["ema_cross_swing", "momentum_burst"]
    intraday: ["intraday_ema_cross", "intraday_trend_scalp", "intraday_macd", "intraday_session_breakout"]
  compression:
    long_term: ["true_dca"]
    swing: ["ema_cross_swing", "momentum_burst"]
    intraday: ["intraday_ema_cross", "intraday_trend_scalp", "intraday_macd", "intraday_bollinger_rsi", "intraday_session_breakout"]
  breakout_expansion:
    long_term: ["true_dca"]
    swing: ["ema_cross_swing", "momentum_burst", "breakout", "trend_following"]
    intraday: ["intraday_ema_cross", "intraday_trend_scalp", "intraday_macd", "intraday_session_breakout"]
