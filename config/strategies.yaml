# ============================================================
# TRADING BOT - STRATEGY PARAMETERS
# ============================================================

strategies:

  # ---- Tactical DCA (Legacy) ----
  tactical_dca:
    enabled: true
    horizon: "long_term"
    assets: ["SPY", "QQQ", "GLD", "TLT"]
    frequency: "monthly"       # weekly | biweekly | monthly
    buy_day_of_month: 1
    dip_buy_enabled: true
    dip_threshold_pct: -0.05   # Buy extra when asset drops 5%
    bear_reduce_enabled: true
    bear_reduce_pct: 0.30      # Reduce 30% of position in bear

  # ---- True DCA (Fixed Allocation) ----
  true_dca:
    enabled: true
    horizon: "long_term"
    assets: ["SPY"]
    buy_day_of_month: 1
    monthly_size_pct: 0.05
    dip_buy_enabled: true
    dip_size_pct: 0.075
    dip_threshold_pct: -0.05
    max_exposure_pct: 0.85
    min_cash_reserve_pct: 0.10

  # ---- Portfolio Rebalancing ----
  rebalancing:
    enabled: false
    horizon: "long_term"
    frequency: "monthly"
    target_weights:
      SPY: 0.40
      QQQ: 0.25
      GLD: 0.15
      TLT: 0.20
    rebalance_threshold_pct: 0.05   # Rebalance if drift > 5%
    regime_adjust: true

  # ---- Trend Following (Swing) ----
  trend_following:
    enabled: true
    horizon: "swing"
    timeframe: "1d"
    ema_fast: 20
    ema_slow: 50
    ema_trend: 200
    min_adx: 25                # ADX must confirm trend strength
    volume_confirm_ratio: 1.3  # Volume must be 30% above average
    min_confidence: 0.65
    atr_multiplier_sl: 2.0
    atr_multiplier_tp: 4.0

  # ---- Mean Reversion (Swing + Intraday) ----
  mean_reversion:
    enabled: false
    horizon: "swing"           # Also used for intraday with different params
    timeframe: "1d"
    zscore_entry: 2.0          # Enter when zscore < -2 (oversold) or > 2 (overbought)
    zscore_exit: 0.5           # Exit when reverts to mean
    lookback_period: 20
    rsi_oversold: 30
    rsi_overbought: 70
    bb_use: true
    min_confidence: 0.60
    atr_multiplier_sl: 1.5
    atr_multiplier_tp: 2.5

  # ---- Breakout (Swing + Intraday) ----
  breakout:
    enabled: true
    horizon: "swing"
    timeframe: "1d"
    lookback_period: 20       # N-day high/low for breakout level
    volume_confirm_ratio: 1.5 # Must have 50% more volume
    atr_filter: true
    min_atr_pct: 0.005        # Min ATR to avoid low-vol breakouts
    false_breakout_filter: true
    consolidation_days: 5     # Min days of consolidation before breakout
    min_confidence: 0.65
    atr_multiplier_sl: 1.0
    atr_multiplier_tp: 3.0

  # ---- Momentum (Swing) ----
  momentum:
    enabled: false
    horizon: "swing"
    timeframe: "1d"
    lookback_returns: [5, 20, 60]   # Days for momentum calculation
    min_momentum_score: 0.6
    rsi_min: 45               # Not overbought territory
    rsi_max: 75
    min_confidence: 0.60
    atr_multiplier_sl: 2.0
    atr_multiplier_tp: 4.0

  # ---- Volatility Compression Breakout ----
  volatility_compression:
    enabled: false
    horizon: "swing"
    timeframe: "1d"
    bb_squeeze_threshold: 0.02   # BB width / price < 2%
    keltner_use: true
    compression_days: 10
    min_confidence: 0.65
    atr_multiplier_sl: 1.5
    atr_multiplier_tp: 3.5

  # ---- Intraday Mean Reversion ----
  intraday_mean_reversion:
    enabled: false
    horizon: "intraday"
    timeframe: "5m"
    zscore_entry: 2.5
    zscore_exit: 0.3
    lookback_period: 48        # 4h of 5m bars
    vwap_use: true
    vwap_distance_pct: 0.005
    rsi_oversold: 25
    rsi_overbought: 75
    min_confidence: 0.70
    atr_multiplier_sl: 1.0
    atr_multiplier_tp: 2.0
    max_trade_duration_bars: 12   # Exit after 60 min max

  # ---- Intraday Breakout ----
  intraday_breakout:
    enabled: false
    horizon: "intraday"
    timeframe: "5m"
    opening_range_minutes: 30     # ORB strategy
    volume_confirm_ratio: 2.0
    min_confidence: 0.70
    atr_multiplier_sl: 0.8
    atr_multiplier_tp: 2.0
    no_trade_after_hour: "19:00"  # UTC

# ---- Regime-to-strategy mapping ----
regime_strategy_map:
  bull_trend:
    long_term: ["true_dca", "tactical_dca"]
    swing: ["trend_following", "breakout"]
    intraday: []
  bear_trend:
    long_term: ["tactical_dca"]         # Reduced DCA only
    swing: []                       # No swing in bear
    intraday: []
  range:
    long_term: ["true_dca", "tactical_dca"]
    swing: []
    intraday: []
  high_volatility:
    long_term: ["true_dca", "tactical_dca"]
    swing: []
    intraday: []
  low_volatility:
    long_term: ["true_dca", "tactical_dca"]
    swing: ["trend_following"]
    intraday: []
  panic:
    long_term: ["tactical_dca"]
    swing: []
    intraday: []
  euphoric:
    long_term: ["true_dca", "tactical_dca"]
    swing: []
    intraday: []
  compression:
    long_term: ["true_dca", "tactical_dca"]
    swing: []
    intraday: []
  breakout_expansion:
    long_term: ["true_dca", "tactical_dca"]
    swing: ["breakout", "trend_following"]
    intraday: []
